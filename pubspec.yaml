name: puresip_purchasing
description: A purchasing system for multiple companies.
version: 1.5.0+0

environment:
  sdk: ">=3.3.0 <4.0.0"

# -----------------------------
# Dependencies
# -----------------------------
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase Core & Features
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.1
  cloud_firestore: ^6.0.0
  firebase_storage: ^13.0.0
  firebase_app_check: ^0.4.0
  firebase_data_connect: ^0.2.0+1

  # Authentication & Sign-in
  google_sign_in: ^7.1.0

  # Utilities
  shared_preferences: ^2.5.3
  logger: ^2.6.0
  intl: ^0.20.2
  connectivity_plus: ^6.1.4
  permission_handler: ^12.0.1
  leak_tracker: ^11.0.1

  # PDF & Printing
  printing: ^5.14.2
  pdf: ^3.10.4
  flutter_pdfview: ^1.4.1+1
  flutter_to_pdf: ^0.4.1

  # UI & Design
  flutter_svg: ^2.2.0
  image_picker: ^1.1.0
  flutter_screenutil: ^5.9.3
  gap: ^3.0.1
  google_fonts: ^6.3.0

  # Routing
  go_router: ^16.0.0

  # State Management
  flutter_bloc: ^9.1.1
  bloc: ^9.0.0
  equatable: ^2.0.7

  # Localization
  easy_localization: ^3.0.7+1

  # Icon Management
  flutter_launcher_icons: ^0.14.4

  # Other Features
  pull_to_refresh: ^2.0.0
  excel: ^4.0.6
  file_picker: ^10.3.1
  qr_flutter: ^4.1.0
  qr: ^3.0.2
  share_plus: ^11.1.0
  path_provider: ^2.1.2
  http: ^1.1.0
  image: ^4.3.0
  universal_html: ^2.2.4
  cupertino_icons: ^1.0.8
  device_info_plus: ^11.5.0
  crypto: ^3.0.6
  network_info_plus: ^6.1.4
  url_launcher: ^6.3.2
  flutter_local_notifications: ^19.4.0
  firebase_messaging: ^16.0.0
  uuid: ^4.5.1
  flutter_secure_storage: ^9.2.4
  firebase_crashlytics: ^5.0.0
  web: ^1.1.1
  collection: ^1.19.1
  package_info_plus: ^8.3.1
  file_saver: ^0.3.1
  typed_data: ^1.4.0
  open_file: ^3.5.10
  iconsax: ^0.0.8
  data_table_2: ^2.6.0
  async: ^2.13.0
  provider: ^6.1.5+1
  fl_chart: ^1.1.0
  hive_flutter: ^1.1.0
  hive: ^2.2.3


# -----------------------------
# Dev Dependencies
# -----------------------------
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# -----------------------------
# Flutter Launcher Icons Config
# -----------------------------
flutter_launcher_icons:
  image_path: "assets/logo.png"

  android: true
  ios: true
  remove_alpha_ios: true


  macos:
    generate: true
    image_path: "assets/logo.png"

  windows:
    generate: true
    image_path: "assets/logo.png"
    icon_size: 48

  linux:
    generate: true
    image_path: "assets/logo.png"

  web:
    generate: true
    image_path: "assets/logo.png"

# -----------------------------
# Flutter Assets & Fonts
# -----------------------------
flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/images/splash_screen.jpg
    - assets/images/no_internet.png
    - assets/lang/
    - assets/animation/headless_bear.riv
    - assets/svgs/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-Light.ttf
          weight: 300
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf



